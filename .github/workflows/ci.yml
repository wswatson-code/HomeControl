name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to a branch cancels the previous in-flight run for it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core Service (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: core/pyproject.toml

      - run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

      - name: OpenAPI contract is up to date
        # Regenerate the exported schema and fail if it differs from what's committed,
        # so the contract the UI + mobile clients depend on never silently drifts.
        run: |
          python scripts/export_openapi.py
          git diff --exit-code ../api/openapi.json

  ui:
    name: Kiosk UI (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - run: npm ci

      - name: Build (vite)
        run: npm run build
